<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body {
      background-color: #0b0e11;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .logo-container {
      position: relative;
      margin-bottom: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2962ff 0%, #12005e 100%);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(41, 98, 255, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .spinner {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 3px solid transparent;
      border-top-color: #2962ff;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 22px;
      margin: 0 0 8px 0;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    p {
      color: #9ca3af;
      font-size: 14px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="spinner"></div>
    <div class="logo">T</div>
  </div>
  <h1>Trading Terminal</h1>
  <p>Initializing secure backend services...</p>
</body>
</html>
