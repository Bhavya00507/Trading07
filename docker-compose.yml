version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading07-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://trading_user:trading_pass@db:5432/trading_db
      - JWT_SECRET=production-secret-jwt-key-commercial-2026-hyper-secure
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: trading07-db
    restart: always
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_pass
      POSTGRES_DB: trading_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
